name: "Open Archive"
tagline: "A class-built, revisitable image bank"
description: "A shared archive that the class builds and returns to across a unit or course. Students add images, annotate connections, and revisit earlier entries as their thinking develops. The archive grows with the class and becomes a cumulative reference."
researchModel: against-feed
researchNote: "The core tool for archive-first teaching: stable, shared, memory-oriented. The class returns to the same bank rather than always encountering the new."
externalUrl: "https://curatewith.art/openarchive"
status: live
