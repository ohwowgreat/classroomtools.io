name: JPEG Degradation
tagline: Watch an image lose data every time it is saved
description: A demonstration tool that makes lossy compression visible. Each time a JPEG is re-saved, it loses data. Run the sequence and watch the image degrade. A provocation for a lesson on what platforms do to images in circulation.
researchModel: with-feed
researchNote: "Opens a lesson on algorithmic image culture: how images are compressed, optimised, and altered in circulation before they reach anyone's feed."
status: live
