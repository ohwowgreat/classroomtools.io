name: "Close Reading"
tagline: "Structured visual analysis before interpretation"
description: "A step-by-step tool that guides students through sustained looking before they reach for meaning. Prompts slow the process down: what repeats, what shifts, what is ambiguous. Students build an evidence base before they make any claims."
researchModel: against-feed
researchNote: "Supports archive-first teaching by making visual attention deliberate and explicit. Resists the feed impulse to move on before comprehension has landed."
status: live
